<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scores - GameTour</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tournament.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-flex">
                <div class="logo">
                    <i class="fas fa-trophy"></i>
                    <span>GameTour</span>
                </div>
                <div class="nav-links">
                    <a href="../index.html">Home</a>
                    <a href="tournaments.html">Tournaments</a>
                    <a href="live-scores.html" class="active">Live Scores</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="#" id="logoutBtn" class="btn-primary-small">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="live-scores-header">
            <h1><i class="fas fa-chart-line"></i> Live Scores & Updates</h1>
            <p>Real-time match scores and updates from ongoing tournaments</p>
        </div>

        <div class="filters-bar">
            <input type="text" id="searchMatch" placeholder="Search matches...">
            <select id="statusFilter">
                <option value="all">All Matches</option>
                <option value="live">Live Now</option>
                <option value="upcoming">Upcoming</option>
                <option value="completed">Completed</option>
            </select>
            <select id="sportFilter">
                <option value="all">All Sports</option>
                <option value="Cricket">Cricket</option>
                <option value="Football">Football</option>
                <option value="Kabaddi">Kabaddi</option>
                <option value="Basketball">Basketball</option>
            </select>
        </div>

        <div id="liveMatchesContainer" class="matches-container">
            <!-- Dynamic content -->
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 GameTour - Live Scores & Updates</p>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script>
        function renderLiveMatches(filter = 'all', sport = 'all', search = '') {
            let matches = matchesData;
            
            if (filter !== 'all') {
                matches = matches.filter(m => m.status === filter);
            }
            
            if (sport !== 'all') {
                matches = matches.filter(m => {
                    const tournament = getTournamentById(m.tournamentId);
                    return tournament && tournament.sport === sport;
                });
            }
            
            if (search) {
                matches = matches.filter(m => 
                    m.teamA.toLowerCase().includes(search.toLowerCase()) ||
                    m.teamB.toLowerCase().includes(search.toLowerCase()) ||
                    m.tournamentName.toLowerCase().includes(search.toLowerCase())
                );
            }
            
            const container = document.getElementById('liveMatchesContainer');
            
            if (matches.length === 0) {
                container.innerHTML = '<div class="no-matches"><i class="fas fa-futbol"></i><p>No matches found</p></div>';
                return;
            }
            
            container.innerHTML = matches.map(match => `
                <div class="match-card ${match.status}">
                    <div class="match-header-info">
                        <span class="tournament-badge">${match.tournamentName}</span>
                        <span class="match-status status-${match.status}">${match.status.toUpperCase()}</span>
                    </div>
                    <div class="match-teams">
                        <div class="team">
                            <h3>${match.teamA}</h3>
                            <div class="score">${match.scoreA}</div>
                        </div>
                        <div class="vs">VS</div>
                        <div class="team">
                            <h3>${match.teamB}</h3>
                            <div class="score">${match.scoreB}</div>
                        </div>
                    </div>
                    <div class="match-details">
                        <p><i class="fas fa-map-marker-alt"></i> ${match.venue}</p>
                        <p><i class="fas fa-clock"></i> ${match.time}</p>
                        <p><i class="fas fa-calendar"></i> ${match.date}</p>
                    </div>
                    ${match.status === 'live' ? '<div class="live-indicator"><i class="fas fa-circle"></i> LIVE</div>' : ''}
                </div>
            `).join('');
        }
        
        // Auto-refresh live scores every 10 seconds
        let autoRefresh = setInterval(() => {
            const statusFilter = document.getElementById('statusFilter').value;
            const sportFilter = document.getElementById('sportFilter').value;
            const searchTerm = document.getElementById('searchMatch').value;
            if (statusFilter === 'live' || statusFilter === 'all') {
                renderLiveMatches(statusFilter, sportFilter, searchTerm);
            }
        }, 10000);
        
        document.getElementById('searchMatch').addEventListener('input', (e) => {
            renderLiveMatches(
                document.getElementById('statusFilter').value,
                document.getElementById('sportFilter').value,
                e.target.value
            );
        });
        
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            renderLiveMatches(
                e.target.value,
                document.getElementById('sportFilter').value,
                document.getElementById('searchMatch').value
            );
        });
        
        document.getElementById('sportFilter').addEventListener('change', (e) => {
            renderLiveMatches(
                document.getElementById('statusFilter').value,
                e.target.value,
                document.getElementById('searchMatch').value
            );
        });
        
        renderLiveMatches();
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('gametour_user');
            window.location.href = '../index.html';
        });
    </script>
    
    <style>
        .live-scores-header {
            text-align: center;
            padding: 3rem 0 1rem;
        }
        .live-scores-header h1 {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .live-scores-header i {
            color: #3b82f6;
        }
        .matches-container {
            margin: 2rem 0;
        }
        .match-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .match-card.live {
            border-left: 4px solid #ef4444;
        }
        .match-header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .tournament-badge {
            background: #f1f5f9;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #475569;
        }
        .match-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 2rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .team h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .score {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
        }
        .vs {
            font-size: 1.2rem;
            font-weight: bold;
            color: #94a3b8;
        }
        .match-details {
            display: flex;
            justify-content: space-around;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.9rem;
        }
        .match-details i {
            margin-right: 0.5rem;
        }
        .live-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ef4444;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .no-matches {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 16px;
        }
        .no-matches i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .match-teams {
                gap: 1rem;
            }
            .team h3 {
                font-size: 1rem;
            }
            .score {
                font-size: 1.5rem;
            }
            .match-details {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
        }
    </style>
</body>
</html>
